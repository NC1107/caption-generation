name: Publish image

# Builds two image variants and pushes them to GHCR:
#   default       → caption-generation:latest        (CPU, ~1.4 GB)
#   -translate    → caption-generation:latest-translate (bundled LibreTranslate, ~3.5 GB)
# main → `latest*`, `main*`, `sha-*`; tag vX.Y.Z → `X.Y.Z*` + a GitHub Release.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create releases on tags
  packages: write # push to GHCR

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/nc1107/caption-generation

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            bundle_translate: "false"
            suffix: ""
          - variant: translate
            bundle_translate: "true"
            suffix: "-translate"
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          flavor: suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            BUNDLE_TRANSLATE=${{ matrix.bundle_translate }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      - name: GitHub Release
        if: matrix.variant == 'default' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
