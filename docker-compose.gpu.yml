# GPU overlay — use together with the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build
#
# Requirements:
#   • An NVIDIA GPU + the NVIDIA Container Toolkit installed on the host.
#   • The image is rebuilt with CUDA libraries (INSTALL_CUDA=true below).
services:
  app:
    build:
      context: .
      args:
        INSTALL_CUDA: "true"
    environment:
      WHISPER_DEVICE: "cuda"
      WHISPER_COMPUTE_TYPE: "float16"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
