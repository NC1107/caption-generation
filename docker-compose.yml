# One compose file. Defaults to the prebuilt CPU image, fully local.
#
#   docker compose up -d                       # app only
#   docker compose --profile ollama up -d      # + bundled local LLM (Ollama)
#   docker compose --profile translate up -d   # + offline translator (LibreTranslate)
#
# GPU: set `image: …:latest-gpu` below + uncomment the GPU block in `app`, then
#      `docker compose up -d` (needs the NVIDIA Container Toolkit).
#
# A git-ignored docker-compose.override.yml (if present) is auto-merged for
# machine-specific tweaks — e.g. host networking to reach an Ollama on 127.0.0.1.

services:
  app:
    image: ghcr.io/nc1107/caption-generation:latest
    build:
      context: .
      args:
        INSTALL_CUDA: "false" # GPU: set to "true"
    container_name: caption-generation
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
    restart: unless-stopped
    # GPU: use the ":latest-gpu" image above, then uncomment this block.
    # environment:
    #   WHISPER_DEVICE: "cuda"
    #   WHISPER_COMPUTE_TYPE: "float16"
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: ["gpu"]

  # Optional local LLM — started only with: docker compose --profile ollama up
  ollama:
    image: ollama/ollama:latest
    container_name: caption-generation-ollama
    profiles: ["ollama"]
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  # Optional offline translator — started only with: docker compose --profile translate up
  # Then set LIBRETRANSLATE_URL=http://libretranslate:5000. (Or use the bundled
  # ":latest-translate" image, which has LibreTranslate built in — see the README.)
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: caption-generation-translate
    profiles: ["translate"]
    ports:
      - "5000:5000"
    volumes:
      - libretranslate:/home/libretranslate/.local
    restart: unless-stopped

volumes:
  ollama:
  libretranslate:
